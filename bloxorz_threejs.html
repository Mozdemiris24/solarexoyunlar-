<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloxorz 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            font-family: 'Outfit', system-ui, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 0 8px;
            pointer-events: none;
            z-index: 10;
        }

        #level-name {
            color: #fff;
            font: 700 22px/1 'Outfit', system-ui;
            text-shadow: 0 0 20px rgba(100, 180, 255, .4), 0 2px 8px #000a;
            letter-spacing: 1px;
        }

        #move-info {
            color: #7eb8e0;
            font: 400 14px/1 'Outfit', system-ui;
            margin-top: 8px;
            text-shadow: 0 1px 6px #000a;
            transition: color .3s;
        }

        #move-info.flash {
            color: #ffd700;
        }

        #back-btn {
            position: fixed;
            top: 14px;
            left: 16px;
            color: #556677;
            font-size: 20px;
            cursor: pointer;
            pointer-events: all;
            z-index: 10;
            text-shadow: 0 1px 4px #000a;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .06);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 10px;
            transition: all .2s;
            backdrop-filter: blur(6px);
            font-family: 'Outfit', system-ui;
        }

        #back-btn:hover {
            color: #99bbdd;
            background: rgba(255, 255, 255, .08);
            border-color: rgba(255, 255, 255, .12);
        }

        #restart-btn {
            position: fixed;
            top: 14px;
            right: 16px;
            color: #556677;
            font-size: 24px;
            cursor: pointer;
            pointer-events: all;
            z-index: 10;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .06);
            padding: 5px 12px;
            border-radius: 10px;
            transition: all .2s;
            backdrop-filter: blur(6px);
        }

        #restart-btn:hover {
            color: #99bbdd;
            background: rgba(255, 255, 255, .08);
            transform: rotate(-180deg);
        }

        #level-btns {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background: rgba(0, 0, 0, .3);
            padding: 6px 10px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, .05);
        }

        .lvl-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .05);
            color: #778899;
            font: 700 12px 'Outfit', system-ui;
            cursor: pointer;
            transition: all .2s;
        }

        .lvl-btn:hover {
            background: rgba(255, 255, 255, .12);
            color: #aabbdd;
            transform: scale(1.1);
        }

        .lvl-btn.active {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            border-color: rgba(99, 102, 241, .5);
            box-shadow: 0 0 12px rgba(99, 102, 241, .4);
        }

        .lvl-btn.done {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border-color: rgba(16, 185, 129, .5);
            box-shadow: 0 0 8px rgba(16, 185, 129, .3);
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s ease;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        #overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        #overlay .card {
            background: linear-gradient(145deg, #111827, #0f172a);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 20px;
            padding: 36px 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 24px 48px rgba(0, 0, 0, .5), 0 0 40px rgba(99, 102, 241, .1);
        }

        #overlay h2 {
            color: #ffd700;
            font: 800 30px 'Outfit', system-ui;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        #overlay .info {
            color: #cbd5e1;
            font: 400 15px/1.5 'Outfit', system-ui;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        #overlay .btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ov-btn {
            padding: 12px 26px;
            border-radius: 12px;
            border: none;
            font: 700 14px 'Outfit', system-ui;
            cursor: pointer;
            transition: all .2s;
            letter-spacing: .5px;
        }

        .ov-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .3);
        }

        .ov-btn:active {
            transform: translateY(0);
        }

        .ov-btn.green {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }

        .ov-btn.blue {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
        }

        .ov-btn.gray {
            background: linear-gradient(135deg, #475569, #334155);
            color: #fff;
        }

        .ov-btn.gold {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
        }

        /* Leaderboard */
        .lb-wrap {
            margin-top: 22px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, .08);
            padding-top: 16px;
        }

        .lb-title {
            color: #ffd700;
            font: 700 15px 'Outfit', system-ui;
            margin-bottom: 12px;
            letter-spacing: .5px;
        }

        .lb-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            font: 400 13px 'Outfit', system-ui;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            border-radius: 6px;
            transition: background .2s;
        }

        .lb-row:hover {
            background: rgba(255, 255, 255, .03);
        }

        /* Death flash */
        #death-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 15;
            background: radial-gradient(circle, rgba(255, 50, 50, .3), rgba(255, 0, 0, .1));
            opacity: 0;
            transition: opacity .15s ease-in;
        }

        #death-flash.show {
            opacity: 1;
        }

        /* Death message */
        #death-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            color: #ff6b6b;
            font: 800 28px 'Outfit', system-ui;
            text-shadow: 0 0 30px rgba(255, 50, 50, .5), 0 2px 10px #000;
            opacity: 0;
            transition: all .3s ease;
            z-index: 16;
            pointer-events: none;
            letter-spacing: 2px;
        }

        #death-msg.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>

        // ===================== YILDIZ ALANI =====================
        function yildizAlaniOlustur() {
            const adet = 600;
            const geo = new THREE.BufferGeometry();
            const pozisyonlar = new Float32Array(adet * 3);
            const boyutlar = new Float32Array(adet);
            for (let i = 0; i < adet; i++) {
                const yaricap = 80 + Math.random() * 120;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                pozisyonlar[i * 3] = yaricap * Math.sin(phi) * Math.cos(theta);
                pozisyonlar[i * 3 + 1] = yaricap * Math.cos(phi) * 0.6 + 20;
                pozisyonlar[i * 3 + 2] = yaricap * Math.sin(phi) * Math.sin(theta);
                boyutlar[i] = 0.3 + Math.random() * 0.8;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pozisyonlar, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(boyutlar, 1));
            const mat = new THREE.PointsMaterial({
                color: 0xaabbff,
                size: 0.5,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.6
            });
            const yildizlar = new THREE.Points(geo, mat);
            sahne.add(yildizlar);
            return yildizlar;
        }
        const yildizAlani = yildizAlaniOlustur();

        // ===================== OYUN DURUMU =====================

        // ===================== YARDIMCI FONKSİYONLAR =====================
        function kordinatDonustur(gx, gy) { return { x: gx * T, z: gy * T }; }

        function bloklariGetir(c) {
            c = c || aktifBlok;
            if (c.dir === 'v') return [{ x: c.gx, y: c.gy }];
            if (c.dir === 'h') return [{ x: c.gx, y: c.gy }, { x: c.gx + 1, y: c.gy }];
            if (c.dir === 'v2') return [{ x: c.gx, y: c.gy }, { x: c.gx, y: c.gy + 1 }];
            return [{ x: c.gx, y: c.gy }];
        }

        function yuvarlanmaHesapla(yon) {
            let ng = aktifBlok.gx, ny = aktifBlok.gy, nd = aktifBlok.dir;
            if (aktifBlok.dir === 'v') {
                // Dik duruş - 1x1 ayak izi
                if (yon === 'up') { ny -= 2; nd = 'v2'; }
                else if (yon === 'down') { ny += 1; nd = 'v2'; }
                else if (yon === 'left') { ng -= 2; nd = 'h'; }
                else if (yon === 'right') { ng += 1; nd = 'h'; }
            } else if (aktifBlok.dir === 'h') {
                // Yatay yatış (X ekseni) - 2x1 ayak izi
                if (yon === 'up') { ny -= 1; nd = 'h'; }
                else if (yon === 'down') { ny += 1; nd = 'h'; }
                else if (yon === 'left') { ng -= 1; nd = 'v'; }
                else if (yon === 'right') { ng += 2; nd = 'v'; }
            } else {
                // Dikey yatış (Z ekseni) - 1x2 ayak izi (v2)
                if (yon === 'up') { ny -= 1; nd = 'v'; }
                else if (yon === 'down') { ny += 2; nd = 'v'; }
                else if (yon === 'left') { ng -= 1; nd = 'v2'; }
                else if (yon === 'right') { ng += 1; nd = 'v2'; }
            }
            return { gx: ng, gy: ny, dir: nd };
        }

        function gecerliMi(c) {
            const parcalar = bloklariGetir(c);
            for (const b of parcalar) {
                if (b.x < 0 || b.y < 0 || b.x >= izgaraGenisligi || b.y >= izgaraYuksekligi) return false;
                const hucreDegeri = izgaraVerisi[b.y] ? izgaraVerisi[b.y][b.x] : 0;
                if (hucreDegeri === 0) return false;
                // Kırılgan karo (3): sadece dik dururken aşağı düşer
                if (hucreDegeri === 3 && c.dir === 'v') return false;
            }
            return true;
        }

        function blokBoyutlari(yon) {
            if (yon === 'v') return { sx: T * 0.88, sy: T * 2 * 0.88, sz: T * 0.88 };
            if (yon === 'h') return { sx: T * 2 * 0.88, sy: T * 0.88, sz: T * 0.88 };
            if (yon === 'v2') return { sx: T * 0.88, sy: T * 0.88, sz: T * 2 * 0.88 };
            return { sx: T * 0.88, sy: T * 2 * 0.88, sz: T * 0.88 };
        }

        function blokMerkezi(gx, gy, yon) {
            const w = kordinatDonustur(gx, gy);
            if (yon === 'v') return new THREE.Vector3(w.x + T / 2, TH + T, w.z + T / 2);
            if (yon === 'h') return new THREE.Vector3(w.x + T, TH + T / 2, w.z + T / 2);
            if (yon === 'v2') return new THREE.Vector3(w.x + T / 2, TH + T / 2, w.z + T);
            return new THREE.Vector3(w.x + T / 2, TH + T, w.z + T / 2);
        }

        // ===================== SAHNE OLUŞTURMA =====================
        function karolariOlustur() {
            // Eskileri temizle
            while (karoGrubu.children.length > 0) {
                const cocuk = karoGrubu.children[0];
                karoGrubu.remove(cocuk);
                if (cocuk.geometry) cocuk.geometry.dispose();
            }
            hedefParlamasi = null;

            for (let gy = 0; gy < izgaraYuksekligi; gy++) {
                for (let gx = 0; gx < izgaraGenisligi; gx++) {
                    const v = izgaraVerisi[gy][gx];
                    if (v === 0) continue;
                    const w = kordinatDonustur(gx, gy);
                    const hedef = v === 2;
                    const kirilgan = v === 3;

                    // Karo tipine göre materyal seç
                    let karoMat = matKaroNormal;
                    let kenarMat = matKaroKenar;
                    if (hedef) { karoMat = matKaroHedef; kenarMat = matKaroHedefKenar; }
                    else if (kirilgan) { karoMat = matKaroKirilgan; kenarMat = matKaroKirilganKenar; }

                    // Üst karo
                    const ustGeo = new THREE.BoxGeometry(T * 0.96, TH, T * 0.96);
                    const ust = new THREE.Mesh(ustGeo, karoMat);
                    ust.position.set(w.x + T / 2, TH / 2, w.z + T / 2);
                    ust.receiveShadow = true;
                    ust.castShadow = true;
                    karoGrubu.add(ust);

                    // Kenar / taban
                    const kenarGeo = new THREE.BoxGeometry(T, TH * 0.5, T);
                    const kenar = new THREE.Mesh(kenarGeo, kenarMat);
                    kenar.position.set(w.x + T / 2, -TH * 0.25, w.z + T / 2);
                    karoGrubu.add(kenar);

                    // Kırılgan karo: uyarı çarpı deseni ekle
                    if (kirilgan) {
                        const carpiMat = new THREE.MeshStandardMaterial({
                            color: 0xff4400,
                            emissive: 0xff2200,
                            emissiveIntensity: 0.4,
                            roughness: 0.3,
                            metalness: 0.2
                        });
                        const cubuk1 = new THREE.Mesh(
                            new THREE.BoxGeometry(T * 0.7, TH * 0.15, T * 0.08),
                            carpiMat
                        );
                        cubuk1.position.set(w.x + T / 2, TH + 0.02, w.z + T / 2);
                        cubuk1.rotation.y = Math.PI / 4;
                        karoGrubu.add(cubuk1);
                        const cubuk2 = new THREE.Mesh(
                            new THREE.BoxGeometry(T * 0.7, TH * 0.15, T * 0.08),
                            carpiMat
                        );
                        cubuk2.position.set(w.x + T / 2, TH + 0.02, w.z + T / 2);
                        cubuk2.rotation.y = -Math.PI / 4;
                        karoGrubu.add(cubuk2);
                    }

                    if (hedef) {
                        // Parlayan halka
                        const halka = new THREE.Mesh(
                            new THREE.TorusGeometry(T * 0.25, T * 0.035, 12, 32),
                            new THREE.MeshStandardMaterial({
                                color: 0xffee00,
                                emissive: 0xffaa00,
                                emissiveIntensity: 0.8,
                                roughness: 0.2,
                                metalness: 0.8
                            })
                        );
                        halka.rotation.x = Math.PI / 2;
                        halka.position.set(w.x + T / 2, TH + 0.02, w.z + T / 2);
                        karoGrubu.add(halka);
                        hedefParlamasi = halka;

                        // Hedefte nokta ışık
                        const gl = new THREE.PointLight(0xffdd00, 0.6, 4);
                        gl.position.set(w.x + T / 2, TH + 0.5, w.z + T / 2);
                        karoGrubu.add(gl);
                    }
                }
            }
        }

        function bloguOlustur() {
            if (blokModeli) {
                sahne.remove(blokModeli);
                if (blokModeli.geometry) blokModeli.geometry.dispose();
                blokModeli = null;
            }
            const d = blokBoyutlari(aktifBlok.dir);
            const geo = new THREE.BoxGeometry(d.sx, d.sy, d.sz);
            blokModeli = new THREE.Mesh(geo, matBlok);
            blokModeli.castShadow = true;
            blokModeli.receiveShadow = true;
            const c = blokMerkezi(aktifBlok.gx, aktifBlok.gy, aktifBlok.dir);
            blokModeli.position.copy(c);
            blokModeli.quaternion.identity();

            // Hafif kenar parlaması
            const kenarlar = new THREE.LineSegments(
                new THREE.EdgesGeometry(geo),
                new THREE.LineBasicMaterial({ color: 0xffaa66, transparent: true, opacity: 0.2 })
            );
            blokModeli.add(kenarlar);
            sahne.add(blokModeli);
        }

        // ===================== KAMERA =====================
        function kamerayiKonumlandir(hemen) {
            const cx = (izgaraGenisligi * T) / 2;
            const cz = (izgaraYuksekligi * T) / 2;
            const maxBoyut = Math.max(izgaraGenisligi, izgaraYuksekligi);
            const mesafe = maxBoyut * 1.6 + 4;

            kameraKonum.set(cx + mesafe * 0.65, mesafe * 0.85, cz + mesafe * 0.85);
            kameraHedef.set(cx, 0, cz);

            if (hemen) {
                kamera.position.copy(kameraKonum);
                kamera.lookAt(kameraHedef);
            }

            gunes.target.position.set(cx, 0, cz);
            gunes.target.updateMatrixWorld();
        }

        // ===================== SEVİYE YÜKLEME =====================
        function seviyeYukle(indeks) {
            mevcutSeviye = indeks;
            const lv = SEVIYELER[indeks];
            izgaraVerisi = lv.grid.map(r => [...r]);
            izgaraYuksekligi = izgaraVerisi.length;
            izgaraGenisligi = izgaraVerisi[0].length;
            aktifBlok.gx = lv.start.x;
            aktifBlok.gy = lv.start.y;
            aktifBlok.dir = lv.dir;
            animasyonVarmi = false;
            olduMu = false;
            seviyeHamleleri = 0;
            karolariOlustur();
            bloguOlustur();
            kamerayiKonumlandir(true);
            arayuzuGuncelle();
            seviyeButonlariniOlustur();
            katmaniGizle();
        }

            setTimeout(() => {

                    tumVeriler.slice(0, 10).forEach((entry, i) => {
                        const satir = document.createElement('div');
                        satir.className = 'lb-row';
                        const isMe = entry.isim.includes('(Sen)');
                        satir.style.color = isMe ? '#facc15' : (i === 0 ? '#ffd700' : (i < 3 ? '#8899aa' : '#556677'));
                        satir.style.fontWeight = isMe ? '700' : '400';
                        const madalya = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : (i + 1) + '.'));
                        satir.innerHTML = '<span>' + madalya + ' ' + entry.isim.replace(' (Sen)', '') + '</span><span style="font-weight:700;">' + entry.skor + ' hamle</span>';
                        wrap.appendChild(satir);
                    });
                    if (tumVeriler.length === 0) {
                        wrap.innerHTML += '<div style="color:#556677;font:12px \'Outfit\',system-ui;">Henüz skor yok</div>';
                    }
                });
            }, 2000);
        }

        // ===================== ÖLÜM VE OTOMATİK YENİDEN BAŞLATMA =====================
        function hataGoster() {
            if (olduMu) return;
            olduMu = true;

            // Kırmızı yanıp sönme
            const flash = document.getElementById('death-flash');
            flash.classList.add('show');

            // Ölüm yazısı
            const msg = document.getElementById('death-msg');
            msg.classList.add('show');

            // Kısa bir gecikmeden sonra otomatik yeniden başlat
            setTimeout(() => {
                flash.classList.remove('show');
                msg.classList.remove('show');
                seviyeyiYenidenBaslat();
            }, 800);
        }

        function kazanmaKontrol() {
            if (aktifBlok.dir === 'v') {
                const b = bloklariGetir()[0];
                if (izgaraVerisi[b.y] && izgaraVerisi[b.y][b.x] === 2) {
                    animasyonVarmi = true;
                    // Kazanma batma animasyonu
                    if (blokModeli) {
                        const bm = blokModeli;
                        const baslangicY = bm.position.y;
                        const baslangicZamani = performance.now();
                        function batmaAnimasyonu() {
                            const t = Math.min((performance.now() - baslangicZamani) / 600, 1);
                            const yumusaklik = t * t;
                            if (bm) {
                                bm.position.y = baslangicY - yumusaklik * 1.5;
                                bm.scale.setScalar(1 - yumusaklik * 0.3);
                            }
                            if (t < 1) requestAnimationFrame(batmaAnimasyonu);
                            else seviyeKazandiGoster();
                        }
                        requestAnimationFrame(batmaAnimasyonu);
                    } else {
                        setTimeout(seviyeKazandiGoster, 300);
                    }
                }
            }
        }

        // ===================== PİVOT ANİMASYONU =====================
        function pivotBilgisiAl(yon) {
            const gx = aktifBlok.gx, gy = aktifBlok.gy, d = aktifBlok.dir;
            const wx = gx * T, wz = gy * T;
            let px, pz, eksen, aci;

            if (d === 'v') {
                // Dik duruş - taban kenarlarından pivot al
                if (yon === 'right') { px = wx + T; pz = wz + T / 2; eksen = new THREE.Vector3(0, 0, 1); aci = -Math.PI / 2; }
                if (yon === 'left') { px = wx; pz = wz + T / 2; eksen = new THREE.Vector3(0, 0, -1); aci = -Math.PI / 2; }
                if (yon === 'down') { px = wx + T / 2; pz = wz + T; eksen = new THREE.Vector3(-1, 0, 0); aci = -Math.PI / 2; }
                if (yon === 'up') { px = wx + T / 2; pz = wz; eksen = new THREE.Vector3(1, 0, 0); aci = -Math.PI / 2; }
            } else if (d === 'h') {
                // X ekseni boyunca yatay yatış (2 genişlik, 1 derinlik)
                if (yon === 'right') { px = wx + T * 2; pz = wz + T / 2; eksen = new THREE.Vector3(0, 0, 1); aci = -Math.PI / 2; }
                if (yon === 'left') { px = wx; pz = wz + T / 2; eksen = new THREE.Vector3(0, 0, -1); aci = -Math.PI / 2; }
                if (yon === 'down') { px = wx + T; pz = wz + T; eksen = new THREE.Vector3(-1, 0, 0); aci = -Math.PI / 2; }
                if (yon === 'up') { px = wx + T; pz = wz; eksen = new THREE.Vector3(1, 0, 0); aci = -Math.PI / 2; }
            } else {
                // Z ekseni boyunca yatay yatış (1 genişlik, 2 derinlik) (v2)
                if (yon === 'right') { px = wx + T; pz = wz + T; eksen = new THREE.Vector3(0, 0, 1); aci = -Math.PI / 2; }
                if (yon === 'left') { px = wx; pz = wz + T; eksen = new THREE.Vector3(0, 0, -1); aci = -Math.PI / 2; }
                if (yon === 'down') { px = wx + T / 2; pz = wz + T * 2; eksen = new THREE.Vector3(-1, 0, 0); aci = -Math.PI / 2; }
                if (yon === 'up') { px = wx + T / 2; pz = wz; eksen = new THREE.Vector3(1, 0, 0); aci = -Math.PI / 2; }
            }
            return { point: new THREE.Vector3(px, 0, pz), axis: eksen, angle: aci };
        }

        let animasyonBaslangicZamani = null, animasyonVerisi = null;

        function pivotYuvarlanmaAnimasyonu(yon, tamamlandiginda) {
            const bilgi = pivotBilgisiAl(yon);
            if (!bilgi || !bilgi.point) return;
            const pivotObj = new THREE.Object3D();
            pivotObj.position.copy(bilgi.point);
            sahne.add(pivotObj);
            sahne.remove(blokModeli);
            blokModeli.position.sub(bilgi.point);
            pivotObj.add(blokModeli);
            animasyonBaslangicZamani = performance.now();
            animasyonVerisi = {
                pivotObj, axis: bilgi.axis, totalAngle: bilgi.angle,
                onComplete: () => {
                    pivotObj.remove(blokModeli);
                    sahne.remove(pivotObj);
                    if (blokModeli) { blokModeli.geometry.dispose(); blokModeli = null; }
                    tamamlandiginda();
                }
            };
        }

        function yumusakGecis(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

        // ===================== HAREKET =====================
        function hareketEt(yon) {
            if (animasyonVarmi || olduMu) return;
            const sonraki = yuvarlanmaHesapla(yon);
            const gecerli = gecerliMi(sonraki);

            if (!gecerli) {
                animasyonVarmi = true;
                pivotYuvarlanmaAnimasyonu(yon, () => { dusVeSifirla(); });
                return;
            }

            seviyeHamleleri++;
            toplamHamleler++;
            arayuzuGuncelle();
            animasyonVarmi = true;

            pivotYuvarlanmaAnimasyonu(yon, () => {
                aktifBlok.gx = sonraki.gx;
                aktifBlok.gy = sonraki.gy;
                aktifBlok.dir = sonraki.dir;
                bloguOlustur();
                animasyonVarmi = false;
                kazanmaKontrol();
            });
        }

        function dusVeSifirla() {
            if (!blokModeli) { hataGoster(); return; }
            const baslangicY = blokModeli.position.y;
            const baslangicZamani = performance.now();
            const fm = blokModeli;
            blokModeli = null; // çift kullanımı önle
            function dus() {
                const t = Math.min((performance.now() - baslangicZamani) / 500, 1);
                if (fm) {
                    fm.position.y = baslangicY - t * t * 10;
                    fm.rotation.x += 0.06;
                    fm.rotation.z += 0.04;
                    fm.scale.setScalar(1 - t * 0.5);
                }
                if (t < 1) requestAnimationFrame(dus);
                else {
                    if (fm) {
                        sahne.remove(fm);
                        if (fm.geometry) fm.geometry.dispose();
                    }
                    hataGoster();
                }
            }
            requestAnimationFrame(dus);
        }

        // ===================== LİDERLİK TABLOSU =====================
        const GOOGLE_TABLO_URL = "https://script.google.com/macros/s/AKfycbwttzdlDrk95e55BhWw93bzVWNIeK2eaCqQEAy1QDUMWP7UpjQOFywCZUVRgoViPBb4LQ/exec";

        function skorGonder(isim, skor) {
            const fd = new FormData();
            fd.append('isim', isim);
            fd.append('skor', skor);
            fd.append('game', 'bloxorz');
            fetch(GOOGLE_TABLO_URL, { method: 'POST', body: fd, mode: 'no-cors' })
                .then(() => console.log('Skor gönderildi'))
                .catch(e => console.error('Skor hatası:', e));
        }

        function liderlikTablosunuGetir(callback) {
            const cbAdi = 'lb_cb_' + Math.floor(Math.random() * 1e6);
            window[cbAdi] = function (data) {
                delete window[cbAdi];
                const el = document.getElementById('lb-script');
                if (el) el.remove();
                callback(data || []);
            };
            const s = document.createElement('script');
            s.id = 'lb-script';
            s.crossOrigin = 'anonymous';
            s.src = GOOGLE_TABLO_URL + '?callback=' + cbAdi + '&game=bloxorz&t=' + Date.now();
            s.onerror = () => { delete window[cbAdi]; callback([]); };
            document.body.appendChild(s);
        }

        // ===================== GİRİŞ =====================
        window.addEventListener('keydown', e => {
            const tusHaritasi = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right',
                W: 'up', S: 'down', A: 'left', D: 'right'
            };
            if (tusHaritasi[e.key]) { e.preventDefault(); hareketEt(tusHaritasi[e.key]); }
            if (e.key === 'r' || e.key === 'R') seviyeyiYenidenBaslat();
        });

        let swipeSX, swipeSY;
        isleyici.domElement.addEventListener('touchstart', e => {
            swipeSX = e.touches[0].clientX;
            swipeSY = e.touches[0].clientY;
        }, { passive: true });
        isleyici.domElement.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - swipeSX;
            const dy = e.changedTouches[0].clientY - swipeSY;
            if (Math.sqrt(dx * dx + dy * dy) < 25) return;
            if (Math.abs(dx) > Math.abs(dy)) hareketEt(dx > 0 ? 'right' : 'left');
            else hareketEt(dy > 0 ? 'down' : 'up');
        });

        // ===================== ANİMASYON DÖNGÜSÜ =====================
        let zaman = 0;
        function canlandir() {
            requestAnimationFrame(canlandir);
            zaman += 0.016;

            // Yumuşak kamera
            kamera.position.lerp(kameraKonum, 0.05);
            kamera.lookAt(kameraHedef);

            // Yıldız alanı rotasyonu
            if (yildizAlani) yildizAlani.rotation.y += 0.0001;

            // Hedef halkası parlama darbesi
            if (hedefParlamasi) {
                hedefParlamasi.scale.setScalar(1.0 + Math.sin(zaman * 3) * 0.08);
                hedefParlamasi.material.emissiveIntensity = 0.6 + Math.sin(zaman * 4) * 0.3;
            }

            // Yuvarlanma animasyonu
            if (animasyonVerisi && animasyonBaslangicZamani !== null) {
                const t = Math.min((performance.now() - animasyonBaslangicZamani) / YUVARLANMA_MS, 1);
                animasyonVerisi.pivotObj.rotation.set(0, 0, 0);
                animasyonVerisi.pivotObj.rotateOnWorldAxis(animasyonVerisi.axis, animasyonVerisi.totalAngle * yumusakGecis(t));
                if (t >= 1) {
                    const cb = animasyonVerisi.onComplete;
                    animasyonVerisi = null; animasyonBaslangicZamani = null;
                    cb();
                }
            }

            isleyici.render(sahne, kamera);
        }

        // ===================== BOYUTLANDIRMA =====================
        window.addEventListener('resize', () => {
            kamera.aspect = innerWidth / innerHeight;
            kamera.updateProjectionMatrix();
            isleyici.setSize(innerWidth, innerHeight);
            kamerayiKonumlandir(false);
        });

        // ===================== BAŞLAT =====================
        oyuncuAdi = prompt("İsmini gir:") || "Anonim";
        try { enIyiToplam = parseInt(localStorage.getItem('bloxorz_best') || '0'); } catch (e) { }
        seviyeYukle(0);
        canlandir();

        // Geliştirici araçlarını ve sağ tıkı engelle
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        });

    </script>
