<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Etkinlik - Survivor</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden;
            touch-action: none; /* Pull-to-refresh ve diğer tarayıcı dokunma hareketlerini engeller */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        canvas {
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }
    </style>
</head>

<body>

    <script>
        // 1. OYUN YAPILANDIRMASI (Mobil ekranı tam kaplayacak)
        const scaleFactor = Math.min(window.innerWidth / 375, window.innerHeight / 667);

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            render: {
                antialias: true,
                pixelArt: false
            },
            physics: {
                default: 'arcade',
                arcade: {
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };


        // Değişkenlerimiz
        let player;
        let enemies;
        let pointer;
        let playerFacingRight = true;
        let isMoving = false;

        // Kart sistemi
        let cards = [];
        let energyRingActive = false;
        let lightningGraphics;
        let lightningTimer = 0;

        // Yörünge Yıldızları
        let orbitStarsActive = false;
        let orbitStarsGraphics;
        let orbitAngle = 0;

        // XP ve Seviye Sistemi
        let gems;
        let playerXP = 0;
        let playerLevel = 1;
        let xpToNextLevel = 10;
        let xpBar;
        let xpBarBg;
        let xpText;

        // Yeni Eklentiler (Silindir, Dondurucu Gaz)
        let cylinderActive = false;
        let cylinderTimer = 0;
        let cylinders;

        let freezeGasActive = false;
        let freezeGasTimer = 0;
        let freezeGasGraphics;
        let isFreezing = false;

        let advLightningActive = false;
        let advLightningTimer = 0;

        // Yetenek Seviyeleri (Maksimum 5)
        let abilityLevels = {
            energyRing: 0,
            lightning: 0,
            orbitStars: 0,
            cylinder: 0,
            freezeGas: 0,
            advLightning: 0,
            maxHealth: 0,
            regen: 0
        };

        let regenTimer = 0;
        let isGamePaused = false;

        let enemiesKilled = 0;
        let lastBossSpawnKills = -1;
        let playerName = "";
        let killsText;

        // Joystick Değişkenleri
        let joystickBase;
        let joystickThumb;
        let isJoystickActive = false;
        let joystickVector = new Phaser.Math.Vector2(0, 0);
        const joystickRadius = 60;
        let backgroundTile;

        const googleSheetURL = "https://script.google.com/macros/s/AKfycbwttzdlDrk95e55BhWw93bzVWNIeK2eaCqQEAy1QDUMWP7UpjQOFywCZUVRgoViPBb4LQ/exec";

        // Oyuncu can sistemi
        let playerHealth = 20;
        let maxPlayerHealth = 20;
        let playerHealthBar;
        let playerHealthBarBg;
        let isInvincible = false;

        function preload() {
            this.load.image('walk1', 'assets/1.png');
            this.load.image('walk2', 'assets/2.png');
            this.load.image('walk3', 'assets/3.png');
            this.load.image('walk4', 'assets/4.png');
            this.load.image('walk5', 'assets/5.png');
            this.load.image('petrol', 'assets/petrol.png');
            this.load.image('cim', 'assets/cim.jpg');
            this.load.image('pv', 'assets/pv.jpg');
        }

        // 2. SAHNE OLUŞTURMA VE BAŞLANGIÇ AYARLARI
        function create() {
            // İsim al
            playerName = prompt("Lütfen Yarışmacı İsmini Giriniz:") || "Anonim";

            // Arka plan rengi (Çimen yeşili)
            this.cameras.main.setBackgroundColor('#3b5e2b');

            // Çim zemini döşeme olarak ekle
            backgroundTile = this.add.tileSprite(0, 0, this.scale.width, this.scale.height, 'cim')
                .setOrigin(0, 0)
                .setDisplaySize(this.scale.width, this.scale.height)
                .setDepth(-1);

            // Yürüme animasyonu (5 kare)
            this.anims.create({
                key: 'walk',
                frames: [
                    { key: 'walk1' },
                    { key: 'walk2' },
                    { key: 'walk3' },
                    { key: 'walk4' },
                    { key: 'walk5' }
                ],
                frameRate: 8,
                repeat: -1
            });

            // Oyuncu sprite'ı (fizikli sprite)
            player = this.physics.add.sprite(config.width / 2, config.height / 2, 'walk3');
            player.setOrigin(0.5);
            player.setCollideWorldBounds(true);
            player.body.setSize(480, 800);
            player.body.setOffset(80, 160); // Ofseti de aynı şekilde ölçeklendir
            player.setScale(0.05);

            // Dokunmatik/Mouse kontrolünü al
            pointer = this.input.activePointer;

            // Düşmanlar için fizik grubu
            enemies = this.physics.add.group();

            // Oyuncu ve düşman çarpışma kontrolü (sürekli hasar için overlap yerine collider kullan)
            this.physics.add.collider(player, enemies, playerHit, null, this);

            // Oyuncu can barı oluştur
            createPlayerHealthBar.call(this);

            // Kart sistemi - Oyun başlangıcında 2 kart çıkart
            createCards.call(this);

            // Yıldırım grafikleri için graphics objesi
            lightningGraphics = this.add.graphics();

            // Gems grubu
            gems = this.physics.add.group();

            // Gem toplama kontrolü
            this.physics.add.overlap(player, gems, collectGem, null, this);

            // Seviye barı oluştur
            createLevelBar.call(this);

            // Silindirler için fizik grubu
            cylinders = this.physics.add.group();
            this.physics.add.overlap(cylinders, enemies, (cylinder, enemy) => {
                damageEnemy.call(this, enemy, 1 + (abilityLevels.cylinder * 1));
            });

            // Skor (Petrol) Metni
            killsText = this.add.text(config.width - 20, 20, 'Haklanan Petrol: 0', {
                fontSize: (18 * scaleFactor) + 'px',
                fontFamily: 'Arial, sans-serif',
                color: '#ffffff',
                fontStyle: 'bold'
            }).setOrigin(1, 0);

            // Joystick başlangıçta görünmez, dokunulduğunda pozisyon alır
            let joystickInitialized = false;

            joystickBase = this.add.circle(0, 0, joystickRadius, 0x888888, 0.5).setVisible(false);
            joystickThumb = this.add.circle(0, 0, 30, 0xcccccc, 0.8).setVisible(false);

            joystickBase.setDepth(100);
            joystickThumb.setDepth(101);

            this.input.on('pointerdown', (pointer) => {
                joystickBase.setPosition(pointer.x, pointer.y);
                joystickThumb.setPosition(pointer.x, pointer.y);
                joystickBase.setVisible(true);
                joystickThumb.setVisible(true);
                isJoystickActive = true;
            });

            this.input.on('pointermove', (pointer) => {
                if (isJoystickActive) {
                    const jX = joystickBase.x;
                    const jY = joystickBase.y;
                    const dist = Phaser.Math.Distance.Between(pointer.x, pointer.y, jX, jY);
                    const angle = Phaser.Math.Angle.Between(jX, jY, pointer.x, pointer.y);

                    const limitedDist = Math.min(dist, joystickRadius);
                    joystickThumb.x = jX + Math.cos(angle) * limitedDist;
                    joystickThumb.y = jY + Math.sin(angle) * limitedDist;

                    joystickVector.setTo(Math.cos(angle) * (limitedDist / joystickRadius), Math.sin(angle) * (limitedDist / joystickRadius));
                }
            });

            this.input.on('pointerup', () => {
                isJoystickActive = false;
                joystickBase.setVisible(false);
                joystickThumb.setVisible(false);
                joystickVector.setTo(0, 0);
            });

            // --- RESIZE DESTEĞİ ---
            this.scale.on('resize', (gameSize) => {
                const width = gameSize.width;
                const height = gameSize.height;

                // Fizik dünyası sınırlarını güncelle
                this.physics.world.setBounds(0, 0, width, height);

                // XP Bar (createLevelBar ile tutarlı pozisyonlar)
                const xpBarWidth = width - 40;
                if (xpBarBg) {
                    xpBarBg.x = width / 2;
                    xpBarBg.y = height - 15;
                    xpBarBg.width = xpBarWidth;
                }
                if (xpBar) {
                    xpBar.x = 20;
                    xpBar.y = height - 15;
                }
                if (xpText) {
                    xpText.x = width / 2;
                    xpText.y = height - 30;
                }

                // Kills Text
                if (killsText) {
                    killsText.x = width - 20;
                }

                // Joystick - ekran sınırları içinde tut
                if (joystickBase) {
                    joystickBase.x = Math.min(joystickBase.x, width - 50);
                    joystickBase.y = Math.min(joystickBase.y, height - 50);
                    if (!isJoystickActive) {
                        joystickThumb.setPosition(joystickBase.x, joystickBase.y);
                    }
                }

                // HUD Cards - doğru pozisyonla yeniden oluştur
                createCards.call(this);

                // Oyuncu sağlık barı pozisyonunu güncelle
                if (playerHealthBarBg) {
                    const hbY = height - 40;
                    playerHealthBarBg.y = hbY;
                    playerHealthBar.y = hbY;
                    if (healthText) healthText.y = hbY;
                }

                // Çim zemini yeniden boyutlandır
                if (backgroundTile) {
                    backgroundTile.setDisplaySize(width, height);
                }
            });

            // --- OYUNA BAŞLA VE TAM EKRAN BUTONU ---
            isGamePaused = true;
            this.physics.world.pause();

            let startOverlay = this.add.rectangle(config.width / 2, config.height / 2, config.width, config.height, 0x000000, 0.8).setDepth(1000);
            let startBtn = this.add.container(config.width / 2, config.height / 2).setDepth(1001);
            let btnBg = this.add.rectangle(0, 0, 250, 70, 0x00ff00).setInteractive();
            let btnText = this.add.text(0, 0, 'OYUNA BAŞLA', {
                fontSize: '24px',
                color: '#000',
                fontStyle: 'bold',
                align: 'center'
            }).setOrigin(0.5);
            startBtn.add([btnBg, btnText]);

            btnBg.on('pointerdown', () => {
                if (this.scale.fullscreenCapability) {
                    this.scale.startFullscreen();
                }
                startOverlay.destroy();
                startBtn.destroy();
                isGamePaused = false;
                this.physics.world.resume();

                // Spawn timer'ını başlat
                this.time.addEvent({
                    delay: 1000,
                    callback: spawnEnemy,
                    callbackScope: this,
                    loop: true
                });
                // İlk düşmanı hemen doğur
                spawnEnemy.call(this);

                // --- OYUN BAŞLADIĞINDA İLK YETENEK SEÇİMİ ---
                this.time.delayedCall(300, () => {
                    showUpgradeMenu.call(this);
                });
            });
        }

        // 3. OYUN DÖNGÜSÜ (Saniyede 60 kez çalışır)
        function update() {
            if (isGamePaused) return;

            // Can Yenileme (Regen) yeteneği
            if (abilityLevels.regen > 0) {
                regenTimer -= 16.67;
                if (regenTimer <= 0) {
                    if (playerHealth < maxPlayerHealth) {
                        playerHealth = Math.min(maxPlayerHealth, playerHealth + abilityLevels.regen);
                        updatePlayerHealthBar.call(this);
                    }
                    regenTimer = 10000; // 10 saniye
                }
            }

            // Joystick veya Dokunma ile Hareket
            if (isJoystickActive) {
                // Hız çarpanını 2 katına çıkardık (240)
                const speed = 240;
                player.body.setVelocity(joystickVector.x * speed, joystickVector.y * speed);
                isMoving = true;

                if (joystickVector.x !== 0) {
                    playerFacingRight = joystickVector.x > 0;
                }
            } else {
                player.body.setVelocity(0);
                isMoving = false;
            }

            // Animasyon kontrolü
            if (isMoving) {
                if (!player.anims.isPlaying || player.anims.currentAnim.key !== 'walk') {
                    player.anims.play('walk', true);
                }
                player.setFlipX(!playerFacingRight);
            } else {
                player.anims.pause();
                player.setTexture('walk3');
                player.setFlipX(!playerFacingRight);
            }

            // Tüm düşmanları oyuncuya doğru yönlendir
            enemies.getChildren().forEach(function (enemy) {
                const width = this.scale.width;
                const height = this.scale.height;

                // Ekran içinde mi kontrol et (yetenekler sadece ekrandaki düşmanlara etki eder)
                if (enemy.x > 0 && enemy.x < width && enemy.y > 0 && enemy.y < height) {
                    enemy.isInBounds = true;
                }

                // Düşmanları her zaman oyuncuya doğru yönlendir
                const speed = enemy.isBoss ? 30 : 100;
                this.physics.moveToObject(enemy, player, speed);

                // Can barı pozisyonunu güncelle
                if (enemy.healthBar && enemy.healthBarBg) {
                    const barWidth = enemy.isBoss ? 60 : 24;
                    enemy.healthBarBg.x = enemy.x - barWidth / 2;
                    enemy.healthBarBg.y = enemy.y - (enemy.isBoss ? 45 : 18);
                    enemy.healthBar.x = enemy.x - barWidth / 2;
                    enemy.healthBar.y = enemy.y - (enemy.isBoss ? 45 : 18);
                }
            }, this);

            // Kart yeteneklerini güncelle
            updateCardAbilities.call(this);
        }

        // YARDIMCI FONKSİYONLAR

        const spawnMargin = 100;
        function spawnEnemy() {
            if (isGamePaused) return;

            const width = this.scale.width;
            const height = this.scale.height;

            let x, y;
            const side = Phaser.Math.Between(0, 3); // 0: Üst, 1: Sağ, 2: Alt, 3: Sol
            const padding = 50;

            if (side === 0) { // Üst
                x = Phaser.Math.Between(-padding, width + padding);
                y = -padding;
            } else if (side === 1) { // Alt
                x = Phaser.Math.Between(-padding, width + padding);
                y = height + padding;
            } else if (side === 2) { // Sol
                x = -padding;
                y = Phaser.Math.Between(-padding, height + padding);
            } else { // Sağ
                x = width + padding;
                y = Phaser.Math.Between(-padding, height + padding);
            }

            const isBoss = (enemiesKilled > 0 && enemiesKilled % 100 === 0 && enemiesKilled !== lastBossSpawnKills);

            if (isBoss) {
                let enemy = this.physics.add.sprite(x, y, 'petrol');
                enemy.setOrigin(0.5);
                enemy.setDisplaySize(60, 70); // Petrol'ün 4 katı
                enemy.health = 30;
                enemy.isBoss = true;
                enemy.isInBounds = false;
                enemies.add(enemy);
                lastBossSpawnKills = enemiesKilled;

                const barWidth = 60;
                const barHeight = 6;
                enemy.healthBarBg = this.add.rectangle(x, y - 45, barWidth, barHeight, 0x000000).setOrigin(0, 0.5);
                enemy.healthBar = this.add.rectangle(x, y - 45, barWidth, barHeight, 0xff0000).setOrigin(0, 0.5);
            } else {
                let enemy = this.physics.add.sprite(x, y, 'petrol');
                enemy.setOrigin(0.5);
                enemy.setDisplaySize(15, 17.5); // Görsel boyutunu ayarla
                enemy.health = 3;
                enemy.isBoss = false;
                enemy.isInBounds = false;
                enemies.add(enemy);

                const barWidth = 24;
                const barHeight = 4;
                enemy.healthBarBg = this.add.rectangle(x, y - 22, barWidth, barHeight, 0x000000).setOrigin(0, 0.5);
                enemy.healthBar = this.add.rectangle(x, y - 22, barWidth, barHeight, 0x00ff00).setOrigin(0, 0.5);
            }
        }

        function playerHit(player, enemy) {
            if (isInvincible) return;

            playerHealth -= 1;
            updatePlayerHealthBar.call(this);

            console.log("Vuruldun! Kalan can: " + playerHealth);

            // Yenilmezlik süresi
            isInvincible = true;
            player.setTint(0xff0000);

            this.time.delayedCall(500, () => {
                player.clearTint();
                isInvincible = false;
            });

            if (playerHealth <= 0) {
                playerHealth = 0;
                gameOver.call(this);
            }
        }

        let healthText;
        function createPlayerHealthBar() {
            const barWidth = 150;
            const barHeight = 20;
            const x = 20;
            const y = config.height - 40;

            playerHealthBarBg = this.add.rectangle(x + barWidth / 2, y, barWidth, barHeight, 0x000000);
            playerHealthBar = this.add.rectangle(x, y, barWidth, barHeight, 0x00ff00);
            playerHealthBar.setOrigin(0, 0.5);

            healthText = this.add.text(x, y, 'CAN: ' + playerHealth + '/' + maxPlayerHealth, {
                fontSize: '16px',
                color: '#ffffff'
            }).setOrigin(0, 0.5);

            playerHealthBar.y = y;
        }

        function updatePlayerHealthBar() {
            const barWidth = 150;
            const healthPercent = playerHealth / maxPlayerHealth;

            playerHealthBar.width = barWidth * healthPercent;

            // Renk değiştir
            if (healthPercent > 0.6) {
                playerHealthBar.fillColor = 0x00ff00;
            } else if (healthPercent > 0.3) {
                playerHealthBar.fillColor = 0xffff00;
            } else {
                playerHealthBar.fillColor = 0xff0000;
            }

            if (healthText) healthText.setText('CAN: ' + playerHealth + '/' + maxPlayerHealth);
        }

        function gameOver() {
            isGamePaused = true;
            this.physics.world.pause();

            // Joystick Gizle
            if (joystickBase) joystickBase.setVisible(false);
            if (joystickThumb) joystickThumb.setVisible(false);

            // Ekranı karart
            let width = this.scale.width;
            let height = this.scale.height;
            let overlay = this.add.rectangle(width / 2, height / 2, width, height, 0x000000, 0.85);
            overlay.setInteractive();

            this.add.text(width / 2, height * 0.1, 'OYUN BİTTİ!', {
                fontSize: height < 400 ? '24px' : '48px',
                color: '#ff0000',
                fontStyle: 'bold'
            }).setOrigin(0.5);

            this.add.text(width / 2, height * 0.22, playerName + '\nSkor: ' + enemiesKilled + ' Haklanan Petrol', {
                fontSize: height < 400 ? '16px' : '22px',
                color: '#ffffff',
                align: 'center'
            }).setOrigin(0.5);

            // Liderlik Tablosu Başlığı
            this.add.text(width / 2, height * 0.35, '--- LİDERLİK TABLOSU ---', {
                fontSize: height < 400 ? '18px' : '24px',
                color: '#ffd700',
                fontStyle: 'bold'
            }).setOrigin(0.5);

            let loadingText = this.add.text(width / 2, height * 0.45, 'Skor gönderiliyor...', {
                fontSize: '16px',
                color: '#aaaaaa'
            }).setOrigin(0.5);

            // Önce skoru gönder, SONRA liderlik tablosunu çek
            const sceneRef = this;
            skorGonder(playerName, enemiesKilled, function () {
                loadingText.setText('Liderlik tablosu yükleniyor...');
                fetchLeaderboard((data) => {
                    loadingText.destroy();
                    data.forEach((entry, index) => {
                        const yPos = height * 0.45 + (index * (height < 400 ? 18 : 25));
                        if (yPos < height - 80) {
                            sceneRef.add.text(width / 2, yPos, (index + 1) + ". " + entry.isim + " - " + entry.skor, {
                                fontSize: height < 400 ? '14px' : '18px',
                                color: index < 3 ? '#ffd700' : '#ffffff'
                            }).setOrigin(0.5);
                        }
                    });
                });
            });

            // Yeniden Başlat Butonu
            let restartBtn = this.add.container(width / 2, height - 90);
            let btnBg = this.add.rectangle(0, 0, 180, 40, 0x00ff00);
            let btnText = this.add.text(0, 0, 'TEKRAR DENE', { fontSize: '18px', color: '#000', fontStyle: 'bold' }).setOrigin(0.5);
            restartBtn.add([btnBg, btnText]);
            btnBg.setInteractive();
            btnBg.on('pointerdown', () => {
                location.reload();
            });

            // Ana Sayfa Butonu
            let homeBtn = this.add.container(width / 2, height - 40);
            let homeBtnBg = this.add.rectangle(0, 0, 180, 40, 0xcccccc);
            let homeBtnText = this.add.text(0, 0, 'ANA SAYFAYA DÖN', { fontSize: '16px', color: '#000', fontStyle: 'bold' }).setOrigin(0.5);
            homeBtn.add([homeBtnBg, homeBtnText]);
            homeBtnBg.setInteractive();
            homeBtnBg.on('pointerdown', () => {
                window.location.href = 'index.html';
            });
        }

        function fetchLeaderboard(callback) {
            // JSONP Yaklaşımı (CORS Hatasını kalıcı çözmek için)
            const callbackName = 'leaderboard_cb_' + Math.floor(Math.random() * 1000000);
            window[callbackName] = function (data) {
                console.log("Leaderboard Data Received (JSONP):", data);
                delete window[callbackName];
                const scriptTag = document.getElementById('leaderboard-script');
                if (scriptTag) scriptTag.remove();
                callback(data || []);
            };

            const script = document.createElement('script');
            script.id = 'leaderboard-script';
            script.crossOrigin = 'anonymous'; // Mobil uyumluluk için
            script.src = googleSheetURL + (googleSheetURL.includes('?') ? '&' : '?') + 'callback=' + callbackName + '&game=petrolsurvivor&t=' + Date.now();

            script.onerror = () => {
                console.error("JSONP Script Load Error");
                delete window[callbackName];
                callback([]);
            };

            document.body.appendChild(script);
        }

        // KART SİSTEMİ (HUD)
        let hudContainer;
        function createCards() {
            if (hudContainer) hudContainer.destroy();
            hudContainer = this.add.container(0, 0);

            const cardWidth = 60;
            const cardHeight = 70;
            const gap = 10;

            // Sadece level'ı 1 ve üzeri olanları göster
            let activeAbilities = allUpgrades.filter(u => (abilityLevels[u.type] || 0) > 0);

            const width = this.scale.width;
            const startX = width / 2 - ((activeAbilities.length * (cardWidth + gap)) / 2) + gap / 2;

            activeAbilities.forEach((data, index) => {
                const x = startX + index * (cardWidth + gap);
                const y = 45;

                let card = this.add.container(x, y);
                let cardBg = this.add.rectangle(0, 0, cardWidth, cardHeight, data.color);
                let cardText = this.add.text(0, -10, data.name.split('\n')[0], {
                    fontSize: '10px',
                    align: 'center',
                    color: '#000000',
                    fontStyle: 'bold',
                    wordWrap: { width: 50 }
                }).setOrigin(0.5);

                let levelText = this.add.text(0, 15, 'Lv' + abilityLevels[data.type], {
                    fontSize: '12px',
                    color: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);

                card.add([cardBg, cardText, levelText]);
                hudContainer.add(card);
            });
        }

        function toggleAbility(type, bg, originalColor) {
            let active = false;
            switch (type) {
                case 'energyRing':
                    energyRingActive = !energyRingActive; active = energyRingActive; break;
                case 'lightning':
                    if (lightningTimer === 0) lightningTimer = 1000; active = true; break;
                case 'orbitStars':
                    orbitStarsActive = !orbitStarsActive; active = orbitStarsActive;
                    if (!orbitStarsActive && orbitStarsGraphics) orbitStarsGraphics.clear();
                    break;
                case 'cylinder':
                    cylinderActive = !cylinderActive; active = cylinderActive; break;
                case 'freezeGas':
                    freezeGasActive = !freezeGasActive; active = freezeGasActive;
                    if (!freezeGasActive && freezeGasGraphics) freezeGasGraphics.clear();
                    break;
                case 'advLightning':
                    castAdvancedLightning.call(this); active = true; break;
            }

            bg.setFillStyle(active ? 0x00ff00 : originalColor);
            console.log(type + ": " + (active ? "Aktif" : "Pasif"));
        }

        function updateCardAbilities() {
            // Enerji Halkası yeteneği
            if (energyRingActive) {
                drawEnergyRing.call(this);
                checkEnergyRingDamage.call(this);
            }

            // Yıldırım Atışı yeteneği
            if (lightningTimer > 0) {
                lightningTimer -= 16.67;
                if (lightningTimer <= 0) {
                    // Seviyeye göre birden fazla yıldırım
                    const count = Math.min(3, abilityLevels.lightning);
                    for (let i = 0; i < count; i++) {
                        this.time.delayedCall(i * 100, () => castLightning.call(this));
                    }
                    lightningTimer = 1200 - (abilityLevels.lightning * 200); // Daha hızlı (Lv5: 200ms)
                }
            }

            // Yörünge Yıldızları yeteneği
            if (orbitStarsActive) {
                drawOrbitStars.call(this);
                checkOrbitStarDamage.call(this);
            }

            // Panel Fırlatma yeteneği
            if (cylinderActive) {
                cylinderTimer -= 16.67;
                if (cylinderTimer <= 0) {
                    rollCylinder.call(this);
                    cylinderTimer = 2000; // 2 saniyede bir
                }
            }

            // Dondurucu Gaz yeteneği
            if (freezeGasActive) {
                updateFreezeGas.call(this);
            }

            // Gelişmiş Yıldırım yeteneği (Otomatik)
            if (advLightningActive) {
                advLightningTimer -= 16.67;
                if (advLightningTimer <= 0) {
                    castAdvancedLightning.call(this);
                    advLightningTimer = 3500 - (abilityLevels.advLightning * 500); // Level 5'te 1 saniye
                }
            }
        }

        let energyRingGraphics;
        function drawEnergyRing() {
            if (!energyRingGraphics) {
                energyRingGraphics = this.add.graphics();
            }
            energyRingGraphics.clear();

            // Karakterin etrafında hare çiz (yarıçap seviyeye göre artar: 80, 90, 100, 110, 120)
            const radius = 80 + (abilityLevels.energyRing - 1) * 10;
            energyRingGraphics.lineStyle(4, 0x00ffff, 0.8);
            energyRingGraphics.strokeCircle(player.x, player.y, radius);

            // İçi hafif mavi dolgulu
            energyRingGraphics.fillStyle(0x00ffff, 0.2);
            energyRingGraphics.fillCircle(player.x, player.y, radius);
        }

        function checkEnergyRingDamage() {
            const radius = 80 + (abilityLevels.energyRing - 1) * 10;

            enemies.getChildren().forEach(function (enemy) {
                if (enemy.active && enemy.isInBounds) {
                    const distance = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
                    if (distance < radius + 10 && !enemy.hitByRing) {
                        enemy.hitByRing = true;
                        damageEnemy.call(this, enemy, 1 + (abilityLevels.energyRing * 0.5));

                        this.time.delayedCall(1000, () => {
                            if (enemy.active) enemy.hitByRing = false;
                        });
                    }
                }
            }, this);
        }

        function castLightning() {
            // Sadece ekran içindeki düşmanlara yıldırım at
            const aliveEnemies = enemies.getChildren().filter(e => e.active && e.isInBounds);

            if (aliveEnemies.length > 0) {
                const targetEnemy = Phaser.Math.RND.pick(aliveEnemies);

                // Yıldırım çizgisi çiz
                lightningGraphics.clear();

                // Ana çizgi
                lightningGraphics.lineStyle(3, 0xffff00, 1);

                // Rastgele kıvrımlı yıldırım çiz
                let startX = player.x;
                let startY = player.y;
                let endX = targetEnemy.x;
                let endY = targetEnemy.y;

                // Yıldırımı parçalı çiz
                drawLightningBolt.call(this, startX, startY, endX, endY);

                // 200ms sonra temizle
                this.time.delayedCall(200, () => {
                    lightningGraphics.clear();
                });

                // Hedefi vur
                damageEnemy.call(this, targetEnemy, 2);
                console.log("Yıldırım vurdu!");
            }
        }

        function drawLightningBolt(x1, y1, x2, y2) {
            const segments = 6;
            let currentX = x1;
            let currentY = y1;

            for (let i = 1; i <= segments; i++) {
                let t = i / segments;
                let nextX = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 40;
                let nextY = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 40;

                if (i === segments) {
                    nextX = x2;
                    nextY = y2;
                }

                lightningGraphics.lineBetween(currentX, currentY, nextX, nextY);
                currentX = nextX;
                currentY = nextY;
            }
        }

        function damageEnemy(enemy, damage) {
            if (!enemy.health) enemy.health = 3;
            enemy.health -= damage;

            // Can barı güncelle
            updateEnemyHealthBar.call(this, enemy);

            if (enemy.health <= 0) {
                if (enemy.healthBar) enemy.healthBar.destroy();
                if (enemy.healthBarBg) enemy.healthBarBg.destroy();

                // Boss düşman ise 20 XP bırak, normal ise gem bırak
                if (enemy.isBoss) {
                    for (let i = 0; i < 20; i++) {
                        spawnGem.call(this, enemy.x + (Math.random() - 0.5) * 40, enemy.y + (Math.random() - 0.5) * 40);
                    }
                } else {
                    spawnGem.call(this, enemy.x, enemy.y);
                }

                enemy.destroy();
                console.log("Düşman öldürüldü!");

                enemiesKilled++;
                if (killsText) killsText.setText('Haklanan Petrol: ' + enemiesKilled);
            } else {
                console.log("Düşman hasar aldı! Kalan can: " + enemy.health);
            }
        }

        function updateEnemyHealthBar(enemy) {
            if (!enemy.healthBar) return;

            const maxHealth = enemy.isBoss ? 30 : 3;
            const barWidth = enemy.isBoss ? 60 : 24;
            const healthPercent = Math.max(0, enemy.health / maxHealth);

            enemy.healthBar.width = barWidth * healthPercent;
        }

        function drawOrbitStars() {
            if (!orbitStarsGraphics) {
                orbitStarsGraphics = this.add.graphics();
            }
            orbitStarsGraphics.clear();

            orbitAngle += 0.05 + (abilityLevels.orbitStars * 0.01);

            const radius = 100;
            const starCount = 2 + abilityLevels.orbitStars; // Lv1: 3, Lv5: 7 yıldız

            for (let i = 0; i < starCount; i++) {
                const angle = orbitAngle + (i * ((Math.PI * 2) / starCount));
                const x = player.x + Math.cos(angle) * radius;
                const y = player.y + Math.sin(angle) * radius;

                // Yıldız çiz (Basit bir artı veya yıldız şekli)
                orbitStarsGraphics.lineStyle(2, 0xffff00, 1);
                orbitStarsGraphics.fillStyle(0xffff00, 1);

                // Küçük bir yıldız/elmas şekli
                orbitStarsGraphics.beginPath();
                orbitStarsGraphics.moveTo(x, y - 8);
                orbitStarsGraphics.lineTo(x + 6, y);
                orbitStarsGraphics.lineTo(x, y + 8);
                orbitStarsGraphics.lineTo(x - 6, y);
                orbitStarsGraphics.closePath();
                orbitStarsGraphics.fillPath();
                orbitStarsGraphics.strokePath();
            }
        }

        function checkOrbitStarDamage() {
            const radius = 100;
            const starCount = 2 + abilityLevels.orbitStars;
            const hitRadius = 15;

            enemies.getChildren().forEach(function (enemy) {
                if (enemy.active && enemy.isInBounds) {
                    for (let i = 0; i < starCount; i++) {
                        const angle = orbitAngle + (i * ((Math.PI * 2) / starCount));
                        const starX = player.x + Math.cos(angle) * radius;
                        const starY = player.y + Math.sin(angle) * radius;

                        const distance = Phaser.Math.Distance.Between(starX, starY, enemy.x, enemy.y);

                        if (distance < hitRadius + 10 && !enemy['hitByStar' + i]) {
                            enemy['hitByStar' + i] = true;
                            damageEnemy.call(this, enemy, 1.5 + (abilityLevels.orbitStars * 0.5));

                            this.time.delayedCall(400, () => {
                                if (enemy.active) enemy['hitByStar' + i] = false;
                            });
                        }
                    }
                }
            }, this);
        }
        // YENİ EKLENTİ FONKSİYONLARI

        function rollCylinder() {
            const x = player.x;
            const y = player.y;
            const direction = playerFacingRight ? 1 : -1;

            let cylinder = this.physics.add.sprite(x, y, 'pv');
            cylinder.setDisplaySize(40, 40);
            cylinders.add(cylinder);

            cylinder.body.setVelocityX(400 * direction);
            cylinder.body.setAngularVelocity(300 * direction);

            this.time.delayedCall(3000, () => {
                if (cylinder.active) cylinder.destroy();
            });
        }

        function updateFreezeGas() {
            if (!freezeGasGraphics) {
                freezeGasGraphics = this.add.graphics();
            }

            freezeGasTimer -= 16.67;

            if (freezeGasTimer <= -2000) {
                freezeGasTimer = 1000;
            }

            freezeGasGraphics.clear();

            if (freezeGasTimer > 0) {
                isFreezing = true;
                const radius = 100 + (abilityLevels.freezeGas * 20); // Lv1: 120, Lv5: 200
                freezeGasGraphics.lineStyle(2, 0x88ffff, 0.5);
                freezeGasGraphics.fillStyle(0x88ffff, 0.2);
                freezeGasGraphics.fillCircle(player.x, player.y, radius);
                freezeGasGraphics.strokeCircle(player.x, player.y, radius);

                enemies.getChildren().forEach(enemy => {
                    if (!enemy.isInBounds) return;
                    const distance = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
                    if (distance < radius) {
                        enemy.isFrozen = true;
                        if (enemy.body) {
                            enemy.body.setVelocity(0, 0);
                            enemy.fillColor = 0x88ffff;
                        }

                        // Pulse başına 1 hasar ver
                        if (!enemy.hitByGas) {
                            enemy.hitByGas = true;
                            damageEnemy.call(this, enemy, 1);
                        }
                    } else if (enemy.isFrozen) {
                        unfreezeEnemy(enemy);
                    }
                });
            } else {
                isFreezing = false;
                enemies.getChildren().forEach(enemy => {
                    if (enemy.isFrozen) unfreezeEnemy(enemy);
                    enemy.hitByGas = false; // Pulse bittiğinde hasar alabilirliğini sıfırla
                });
            }
        }

        function unfreezeEnemy(enemy) {
            enemy.isFrozen = false;
            enemy.fillColor = 0xff0000;
        }

        // YÜKSELTME SİSTEMİ VERİLERİ VE FONKSİYONLARI
        const allUpgrades = [
            { type: 'energyRing', name: 'Enerji Halkası', color: 0x4488ff },
            { type: 'lightning', name: 'Yıldırım Atışı', color: 0xffdd44 },
            { type: 'orbitStars', name: 'Yörünge Yıldızları', color: 0xff88ff },
            { type: 'cylinder', name: 'Güneş Paneli', color: 0xff5522 },
            { type: 'freezeGas', name: 'Dondurucu Gaz', color: 0x88ffff },
            { type: 'advLightning', name: 'Gelişmiş Yıldırım', color: 0xeeff00 },
            { type: 'maxHealth', name: 'Azami Can +20', color: 0xff0000 },
            { type: 'regen', name: 'Can Yenileme', color: 0x00ff00 }
        ];

        function showUpgradeMenu() {
            // Tüm yetenekler max seviyeye ulaştıysa menüyü gösterme (softlock önlemi)
            let available = allUpgrades.filter(u => (abilityLevels[u.type] || 0) < 5);
            if (available.length === 0) return;

            isGamePaused = true;
            this.physics.world.pause();

            const sw = this.scale.width;
            const sh = this.scale.height;

            // Karartma perdesi
            let overlay = this.add.rectangle(sw / 2, sh / 2, sw, sh, 0x000000, 0.7);
            overlay.setInteractive();

            // Joystick Gizle
            if (joystickBase) joystickBase.setVisible(false);
            if (joystickThumb) joystickThumb.setVisible(false);

            // 2 Rastgele seçenek (Seviyesi 5 olmamışları seç)

            // --- SİLAH GARANTİSİ SİSTEMİ ---
            // Eğer oyuncunun hiç silahı yoksa, seçeneklerden birinin mutlaka silah olmasını sağla
            const weapons = ['energyRing', 'lightning', 'orbitStars', 'cylinder', 'freezeGas'];
            const hasWeapon = weapons.some(w => (abilityLevels[w] || 0) > 0);

            let choices = [];
            if (!hasWeapon) {
                // Mevcut silahlardan birini zorunlu seç
                let availableWeapons = available.filter(u => weapons.includes(u.type));
                if (availableWeapons.length > 0) {
                    let guaranteedWeapon = Phaser.Utils.Array.GetRandom(availableWeapons);
                    choices.push(guaranteedWeapon);
                    // Geri kalanlardan 1 tane daha seç
                    let remaining = available.filter(u => u !== guaranteedWeapon);
                    if (remaining.length > 0) {
                        choices.push(Phaser.Utils.Array.GetRandom(remaining));
                    }
                } else {
                    choices = Phaser.Utils.Array.Shuffle(available).slice(0, 2);
                }
            } else {
                choices = Phaser.Utils.Array.Shuffle(available).slice(0, 2);
            }

            let menuElements = [overlay];

            choices.forEach((data, index) => {
                const x = this.scale.width / 2 + (index === 0 ? -80 : 80);
                const y = this.scale.height / 2;

                let currentLevel = abilityLevels[data.type] || 0;
                let card = this.add.container(x, y);
                let cardBg = this.add.rectangle(0, 0, 140, 180, data.color);

                // Metin Taşmasını Önleme (WordWrap + Küçük Font)
                let cardText = this.add.text(0, -20, data.name, {
                    fontSize: '14px',
                    color: '#000000',
                    fontStyle: 'bold',
                    align: 'center',
                    wordWrap: { width: 120 }
                }).setOrigin(0.5);

                let levelText = this.add.text(0, 30, (currentLevel === 0 ? 'YENİ!' : 'Level ' + (currentLevel + 1)), { fontSize: '14px', color: '#000000' }).setOrigin(0.5);

                card.add([cardBg, cardText, levelText]);
                cardBg.setInteractive();

                cardBg.on('pointerdown', () => {
                    applyUpgrade.call(this, data.type);
                    menuElements.forEach(el => el.destroy());
                    isGamePaused = false;
                    this.physics.world.resume();
                    if (joystickBase) joystickBase.setVisible(true);
                    if (joystickThumb) joystickThumb.setVisible(true);
                    createCards.call(this); // HUD'u güncelle
                });

                menuElements.push(card);
            });
        }

        function applyUpgrade(type) {
            abilityLevels[type] = (abilityLevels[type] || 0) + 1;
            const level = abilityLevels[type];

            switch (type) {
                case 'energyRing': energyRingActive = true; break;
                case 'lightning': lightningTimer = 1000; break;
                case 'orbitStars': orbitStarsActive = true; break;
                case 'cylinder': cylinderActive = true; break;
                case 'freezeGas': freezeGasActive = true; freezeGasTimer = 1000; break;
                case 'advLightning': advLightningActive = true; advLightningTimer = 2000; break;
                case 'maxHealth':
                    maxPlayerHealth += 20;
                    playerHealth += 20;
                    updatePlayerHealthBar.call(this);
                    break;
                case 'regen':
                    if (level === 1) regenTimer = 10000;
                    break;
            }

            console.log("Upgrade uygulandı: " + type + " Level: " + level);
        }

        function castAdvancedLightning() {
            const aliveEnemies = enemies.getChildren().filter(e => e.active && e.isInBounds);
            if (aliveEnemies.length === 0) return;

            const target = Phaser.Math.RND.pick(aliveEnemies);

            let lightning = this.add.graphics();
            lightning.lineStyle(4, 0xeeff00, 1);

            let startY = 0;
            let startX = target.x + (Math.random() - 0.5) * 100;

            let segments = 8;
            let curX = startX;
            let curY = startY;

            for (let i = 1; i <= segments; i++) {
                let t = i / segments;
                let nextX = startX + (target.x - startX) * t + (Math.random() - 0.5) * 50;
                let nextY = startY + (target.y - startY) * t;

                if (i === segments) { nextX = target.x; nextY = target.y; }

                lightning.lineBetween(curX, curY, nextX, nextY);
                curX = nextX;
                curY = nextY;
            }

            damageEnemy.call(this, target, 4 + (abilityLevels.advLightning * 2)); // Lv1: 6, Lv5: 14 Hasar
            this.time.delayedCall(150, () => lightning.destroy());
        }

        // GOOGLE SHEETS ENTEGRASYONU
        function skorGonder(oyuncuIsmi, oyuncuSkoru, onComplete) {
            const formData = new FormData();
            formData.append('isim', oyuncuIsmi);
            formData.append('skor', oyuncuSkoru);
            formData.append('game', 'petrolsurvivor');

            fetch(googleSheetURL, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            })
                .then(() => {
                    console.log('Skor gönderme isteği başarıyla yapıldı.');
                    // Skoru yazdıktan sonra biraz bekle (sunucunun işlemesi için)
                    setTimeout(() => {
                        if (onComplete) onComplete();
                    }, 1500);
                })
                .catch(error => {
                    console.error('Skor gönderme hatası:', error);
                    // Hata olsa bile tabloyu çekmeyi dene
                    if (onComplete) onComplete();
                });
        }

        // SEVİYE SİSTEMİ FONKSİYONLARI
        function spawnGem(x, y) {
            // Küçük mavi bir elmas (gem)
            let gem = this.add.rectangle(x, y, 10, 10, 0x00ffff);
            this.physics.add.existing(gem);
            gems.add(gem);

            // Hafif bir parlama efekti
            this.tweens.add({
                targets: gem,
                scale: 1.2,
                duration: 500,
                yoyo: true,
                repeat: -1
            });

            // 15 saniye sonra otomatik yok et (bellek sızıntısını önle)
            this.time.delayedCall(15000, () => {
                if (gem.active) gem.destroy();
            });
        }

        function collectGem(player, gem) {
            gem.destroy();
            playerXP += 1;
            console.log("XP Toplandı: " + playerXP + "/" + xpToNextLevel);

            if (playerXP >= xpToNextLevel) {
                levelUp.call(this);
            }

            updateLevelBar.call(this);
        }

        function levelUp() {
            playerLevel++;
            playerXP = 0;
            xpToNextLevel = Math.floor(xpToNextLevel * 1.5);

            // Her level'da +1 can yenile
            if (playerHealth < maxPlayerHealth) {
                playerHealth = Math.min(maxPlayerHealth, playerHealth + 1);
                updatePlayerHealthBar.call(this);
            }

            console.log("LEVEL UP! Yeni Seviye: " + playerLevel);

            // Seviye atlama görseli
            let levelText = this.add.text(player.x, player.y - 50, 'LEVEL UP!', {
                fontSize: '32px',
                color: '#ffff00',
                fontStyle: 'bold'
            }).setOrigin(0.5);

            this.tweens.add({
                targets: levelText,
                y: levelText.y - 100,
                alpha: 0,
                duration: 1000,
                onComplete: () => levelText.destroy()
            });

            // 5 seviyede bir yeni kartlar
            if (playerLevel % 5 === 0) {
                showUpgradeMenu.call(this);
            }
        }

        function createLevelBar() {
            const width = this.scale.width;
            const height = this.scale.height;
            const x = 20;
            const y = height - 15;
            const barWidth = width - 40;
            const barHeight = 10;

            xpBarBg = this.add.rectangle(x + barWidth / 2, y, barWidth, barHeight, 0x000000);
            xpBar = this.add.rectangle(x, y, 0, barHeight, 0x4488ff);
            xpBar.setOrigin(0, 0.5);

            xpText = this.add.text(width / 2, y - 15, 'SEVİYE: ' + playerLevel, {
                fontSize: '14px',
                color: '#ffffff',
                fontStyle: 'bold'
            }).setOrigin(0.5);
        }

        function updateLevelBar() {
            const width = this.scale.width;
            const barWidth = width - 40;
            const progress = playerXP / xpToNextLevel;

            xpBar.width = barWidth * progress;
            xpText.setText('SEVİYE: ' + playerLevel + ' (XP: ' + playerXP + '/' + xpToNextLevel + ')');
        }

        const game = new Phaser.Game(config);

        // Geliştirici araçlarını ve sağ tıkı engelle
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        });

    </script>
</body>
